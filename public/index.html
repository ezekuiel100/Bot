<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Palavras Proibidas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #0f172a, #1e2937);
      }
      tr:hover {
        background-color: #1e2937;
      }
    </style>
  </head>
  <body class="min-h-screen text-white">
    <div class="max-w-4xl mx-auto p-6">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-4xl font-bold flex items-center gap-3">
            <i class="fas fa-ban text-red-500"></i>
            Palavras Proibidas
          </h1>
          <p class="text-slate-400 mt-1">Conectado à API Fastify + SQLite</p>
        </div>
        <div class="flex items-center gap-3">
          <button
            onclick="loadWords()"
            class="bg-slate-700 hover:bg-slate-600 px-5 py-2 rounded-2xl flex items-center gap-2 transition"
          >
            <i class="fas fa-sync"></i> Atualizar
          </button>
          <div
            class="px-4 py-2 bg-emerald-500/10 text-emerald-400 rounded-2xl text-sm flex items-center gap-2"
          >
            <div
              class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"
            ></div>
            Online
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-slate-800 rounded-2xl p-5">
          <div class="text-slate-400 text-sm">Total de palavras</div>
          <div id="totalCount" class="text-4xl font-bold mt-2">0</div>
        </div>
        <div class="bg-slate-800 rounded-2xl p-5 col-span-2 flex items-center">
          <div class="text-slate-400">
            API:
            <span class="font-mono text-emerald-400"
              >http://localhost:3333</span
            >
          </div>
        </div>
      </div>

      <!-- Add Form -->
      <div class="bg-slate-800 rounded-3xl p-6 mb-8">
        <div class="flex gap-4">
          <input
            id="wordInput"
            type="text"
            placeholder="Digite a palavra ou frase proibida..."
            class="flex-1 bg-slate-900 border border-slate-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-red-500 text-lg"
            onkeypress="if (event.key === 'Enter') addWord();"
          />
          <button
            onclick="addWord()"
            class="bg-red-600 hover:bg-red-700 px-10 rounded-2xl font-semibold text-lg transition-all flex items-center gap-3"
          >
            <i class="fas fa-plus"></i>
            BANIR
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="flex justify-between items-center mb-4">
        <div class="relative flex-1 max-w-xs">
          <input
            id="searchInput"
            type="text"
            placeholder="Buscar palavra..."
            class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 pl-12 focus:outline-none focus:border-red-500"
            onkeyup="filterTable()"
          />
          <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
        </div>
      </div>

      <!-- Table -->
      <div class="bg-slate-800 rounded-3xl overflow-hidden">
        <table class="w-full">
          <thead>
            <tr class="border-b border-slate-700">
              <th class="text-left py-5 px-8 font-medium text-slate-400">
                PALAVRA / FRASE PROIBIDA
              </th>
              <th class="text-right py-5 px-8 font-medium text-slate-400 w-40">
                AÇÕES
              </th>
            </tr>
          </thead>
          <tbody id="wordList" class="divide-y divide-slate-700"></tbody>
        </table>
      </div>

      <div class="mt-8 text-center text-slate-500 text-sm">
        Frontend conectado à API Fastify • Banco:
        <span class="font-mono">proibidas</span>
      </div>
    </div>

    <!-- Toast -->
    <div
      id="toast"
      class="hidden fixed bottom-6 right-6 bg-slate-900 border border-emerald-500 text-emerald-400 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3"
    >
      <i class="fas fa-check-circle"></i>
      <span id="toastText"></span>
    </div>

    <script>
      const API_URL = window.location.origin || "http://localhost:3333";

      let allWords = [];

      // Mostrar toast
      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        const toastText = document.getElementById("toastText");

        toastText.textContent = message;
        toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transition-all ${
          type === "error"
            ? "border-red-500 text-red-400"
            : "border-emerald-500 text-emerald-400"
        }`;
        toast.classList.remove("hidden");

        setTimeout(() => toast.classList.add("hidden"), 3000);
      }

      // Carregar palavras
      async function loadWords() {
        try {
          const res = await fetch(`${API_URL}/palavras`);
          const data = await res.json();

          if (!data.success) throw new Error(data.error);

          allWords = data.data;
          renderTable();
          document.getElementById("totalCount").textContent = data.total;
        } catch (err) {
          console.error(err);
          showToast(
            "Erro ao carregar palavras. Verifique se a API está rodando.",
            "error",
          );
        }
      }

      // Renderizar tabela
      function renderTable(filteredWords = allWords) {
        const tbody = document.getElementById("wordList");
        tbody.innerHTML = "";

        if (filteredWords.length === 0) {
          tbody.innerHTML = `
          <tr><td colspan="2" class="text-center py-16 text-slate-500">
            Nenhuma palavra encontrada
          </td></tr>`;
          return;
        }

        filteredWords.forEach((word) => {
          const row = document.createElement("tr");
          row.className = "group";
          row.innerHTML = `
          <td class="px-8 py-6 font-medium text-lg">${word.value}</td>
          <td class="px-8 py-6 text-right">
            <button onclick="deleteWord(${word.key})" 
                    class="bg-red-500/10 hover:bg-red-500/20 text-red-400 hover:text-red-300 px-6 py-2 rounded-2xl transition-all opacity-0 group-hover:opacity-100">
              <i class="fas fa-trash"></i> Remover
            </button>
          </td>
        `;
          tbody.appendChild(row);
        });
      }

      // Adicionar palavra
      async function addWord() {
        const input = document.getElementById("wordInput");
        const value = input.value.trim();

        if (!value) return;

        try {
          const res = await fetch(`${API_URL}/palavras`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ value }),
          });

          const data = await res.json();

          if (!data.success) {
            showToast(data.error || "Erro ao adicionar", "error");
            return;
          }

          showToast(data.message);
          input.value = "";
          loadWords(); // recarrega lista
        } catch (err) {
          showToast("Erro de conexão com a API", "error");
        }
      }

      // Deletar palavra
      async function deleteWord(key) {
        if (!confirm("Tem certeza que deseja remover esta palavra?")) return;

        try {
          const res = await fetch(`${API_URL}/palavras/${key}`, {
            method: "DELETE",
          });

          const data = await res.json();

          if (!data.success) {
            showToast(data.error || "Erro ao remover", "error");
            return;
          }

          showToast(data.message);
          loadWords();
        } catch (err) {
          showToast("Erro de conexão com a API", "error");
        }
      }

      // Filtrar em tempo real
      function filterTable() {
        const search = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();

        if (!search) {
          renderTable();
          return;
        }

        const filtered = allWords.filter((word) =>
          word.value.toLowerCase().includes(search),
        );

        renderTable(filtered);
      }

      // Inicialização
      window.onload = () => {
        loadWords();
        console.log(
          "%c✅ Frontend conectado à API Fastify!",
          "color: #f43f5e; font-size: 14px;",
        );
      };
    </script>
  </body>
</html>
